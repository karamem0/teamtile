name: Deploy to Azure

description: This GitHub Action deploys built artifacts to Azure.

runs:
  using: composite
  steps:
    - name: Download artifatcs
      uses: actions/download-artifact@v7
      with:
        name: build
        path: build
    - name: Connect to Azure
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
      with:
        creds: ${{env.AZURE_CREDENTIALS}}
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383
      with:
        app-name: ${{env.AZURE_WEB_APP_NAME}}
        package: build
